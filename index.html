<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>딴짓컷 Webcam MVP</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top, #343434 0, transparent 32%), linear-gradient(135deg, #0d0d0d, #252525);
    color: white;
    overflow-x: hidden;
  }
  .wrap {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .app {
    width: min(980px, 100%);
    display: grid;
    grid-template-columns: 1.05fr .95fr;
    gap: 18px;
  }
  .card {
    background: rgba(255,255,255,.08);
    border: 1px solid rgba(255,255,255,.14);
    border-radius: 28px;
    padding: 22px;
    box-shadow: 0 30px 90px rgba(0,0,0,.45);
    backdrop-filter: blur(14px);
  }
  .badge {
    display: inline-flex;
    padding: 7px 11px;
    border-radius: 999px;
    background: rgba(255, 55, 55, .18);
    color: #ffbcbc;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: .08em;
  }
  h1 {
    margin: 14px 0 8px;
    font-size: clamp(38px, 6vw, 64px);
    line-height: .95;
  }
  p { color: #d6d6d6; line-height: 1.55; }
  video {
    width: 100%;
    aspect-ratio: 16 / 10;
    object-fit: cover;
    background: #050505;
    border-radius: 22px;
    transform: scaleX(-1);
    border: 1px solid rgba(255,255,255,.12);
  }
  .status {
    margin-top: 12px;
    padding: 14px;
    border-radius: 18px;
    background: rgba(0,0,0,.26);
    font-weight: 800;
  }
  .status.good { color: #a7ffbd; }
  .status.bad { color: #ffaaaa; }
  .grid {
    display: grid;
    gap: 12px;
  }
  label {
    display: grid;
    gap: 7px;
    color: #eee;
    font-size: 14px;
    font-weight: 800;
  }
  input, textarea, select {
    width: 100%;
    border: 0;
    outline: none;
    border-radius: 16px;
    padding: 13px 14px;
    background: rgba(0,0,0,.34);
    color: white;
    font-size: 15px;
  }
  textarea { min-height: 82px; resize: vertical; }
  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  button {
    border: 0;
    border-radius: 16px;
    padding: 14px 16px;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    background: white;
    color: #111;
  }
  button.primary {
    color: white;
    background: linear-gradient(135deg, #ff2f2f, #ff8a00);
  }
  button:active { transform: translateY(1px); }
  .small {
    color: #aaa;
    font-size: 13px;
    margin-bottom: 0;
  }
  .overlay {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(120,0,0,.74);
    z-index: 10;
    animation: flash .35s infinite alternate;
  }
  .hidden { display: none; }
  .warning {
    width: min(640px, calc(100% - 30px));
    text-align: center;
    padding: 36px 22px;
    border-radius: 34px;
    background: rgba(0,0,0,.74);
    border: 2px solid rgba(255,255,255,.28);
    box-shadow: 0 25px 120px rgba(0,0,0,.7);
  }
  .emoji {
    font-size: 76px;
    animation: shake .18s infinite alternate;
  }
  .warning h2 {
    margin: 10px 0 8px;
    font-size: clamp(34px, 7vw, 70px);
    line-height: 1.05;
  }
  .warning p {
    margin: 0 0 18px;
    font-size: 18px;
    color: #ffd1d1;
  }
  @keyframes flash {
    from { background: rgba(120,0,0,.58); }
    to { background: rgba(255,0,0,.78); }
  }
  @keyframes shake {
    from { transform: rotate(-7deg) scale(1); }
    to { transform: rotate(7deg) scale(1.08); }
  }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">
  <main class="app">
    <section class="card">
      <span class="badge">WEBCAM FOCUS MVP</span>
      <h1>딴짓컷</h1>
      <p>웹캠으로 얼굴이 사라지거나 고개가 크게 돌아가면 사이렌 + 화면 멘트 + 브라우저 알림을 띄움.</p>
      <video id="video" autoplay muted playsinline></video>
      <div id="status" class="status">대기 중. 시작 버튼 누르셈.</div>
      <p class="small">주의: GitHub Pages 가능. 단, 탭이 완전히 숨겨지면 브라우저가 감지를 제한할 수 있음.</p>
    </section>

    <section class="card grid">
      <label>
        잔소리 멘트
        <textarea id="message">야. 인강 봐라. 지금 눈깔 어디 감?</textarea>
      </label>

      <label>
        감지 민감도
        <select id="sensitivity">
          <option value="2500">느슨함: 2.5초 이탈</option>
          <option value="1700" selected>보통: 1.7초 이탈</option>
          <option value="900">빡셈: 0.9초 이탈</option>
        </select>
      </label>

      <label>
        고개 이탈 기준
        <select id="headLimit">
          <option value="0.20">느슨함</option>
          <option value="0.145" selected>보통</option>
          <option value="0.10">빡셈</option>
        </select>
      </label>

      <div class="buttons">
        <button id="startBtn" class="primary">시작</button>
        <button id="stopBtn">정지</button>
        <button id="notifyBtn">알림 권한</button>
        <button id="testBtn">사이렌 테스트</button>
      </div>

      <p class="small">
        “진짜 시선 추적”이 아니라 MVP용 “얼굴 없음/고개 돌아감” 감지임. 이게 작고 안 죽는 버전.
      </p>
    </section>
  </main>
</div>

<div id="overlay" class="overlay hidden">
  <div class="warning">
    <div class="emoji">🚨</div>
    <h2 id="warningText">야. 인강 봐라.</h2>
    <p id="reasonText">집중 이탈 감지됨</p>
    <button id="awakeBtn">정신차림</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const overlay = document.getElementById("overlay");
const warningText = document.getElementById("warningText");
const reasonText = document.getElementById("reasonText");
const messageInput = document.getElementById("message");
const sensitivity = document.getElementById("sensitivity");
const headLimit = document.getElementById("headLimit");

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");
const notifyBtn = document.getElementById("notifyBtn");
const testBtn = document.getElementById("testBtn");
const awakeBtn = document.getElementById("awakeBtn");

let faceDetection = null;
let camera = null;
let running = false;
let lastGoodTime = Date.now();
let alarmOn = false;
let audioCtx = null;
let sirenTimer = null;
let lastNotificationTime = 0;

function setStatus(text, good = true) {
  statusBox.textContent = text;
  statusBox.className = "status " + (good ? "good" : "bad");
}

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
}

function startSiren() {
  ensureAudio();
  if (sirenTimer) return;

  sirenTimer = setInterval(() => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(650, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1450, audioCtx.currentTime + 0.22);

    gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.35, audioCtx.currentTime + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.32);

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    osc.start();
    osc.stop(audioCtx.currentTime + 0.34);
  }, 360);
}

function stopSiren() {
  if (sirenTimer) {
    clearInterval(sirenTimer);
    sirenTimer = null;
  }
}

function browserNotify(reason) {
  const now = Date.now();
  if (now - lastNotificationTime < 5000) return;
  lastNotificationTime = now;

  if ("Notification" in window && Notification.permission === "granted") {
    new Notification("🚨 딴짓컷", {
      body: reason + " — " + messageInput.value.trim(),
      silent: false
    });
  }
}

function triggerAlarm(reason) {
  if (alarmOn) return;
  alarmOn = true;

  const msg = messageInput.value.trim() || "야. 인강 봐라.";
  warningText.textContent = msg;
  reasonText.textContent = reason;

  overlay.classList.remove("hidden");
  setStatus("🚨 " + reason, false);
  startSiren();
  browserNotify(reason);
  document.title = "🚨 딴짓컷 작동중";
}

function clearAlarm() {
  alarmOn = false;
  overlay.classList.add("hidden");
  stopSiren();
  lastGoodTime = Date.now();
  document.title = "딴짓컷 Webcam MVP";
  if (running) setStatus("감시 중. 화면 봐라.", true);
  else setStatus("정지됨.", true);
}

function checkFace(results) {
  if (!running) return;

  const faces = results.detections || [];
  const now = Date.now();
  const timeout = Number(sensitivity.value);

  if (faces.length === 0) {
    if (now - lastGoodTime > timeout) triggerAlarm("얼굴 사라짐");
    else setStatus("얼굴 찾는 중...", false);
    return;
  }

  const det = faces[0];
  const box = det.boundingBox;
  const nose = det.landmarks && det.landmarks[2];

  if (!box || !nose) {
    lastGoodTime = now;
    setStatus("얼굴 감지됨.", true);
    return;
  }

  const centerX = box.xCenter;
  const centerY = box.yCenter;
  const dx = Math.abs(nose.x - centerX);
  const dy = Math.abs(nose.y - centerY);
  const limit = Number(headLimit.value);

  if (dx > limit || dy > limit * 1.25) {
    if (now - lastGoodTime > timeout) triggerAlarm("고개/시선 이탈 의심");
    else setStatus("고개 돌아감 의심... 복귀하면 봐줌.", false);
    return;
  }

  lastGoodTime = now;
  if (!alarmOn) setStatus("정상 감시 중. 인강 봐라.", true);
}

async function startApp() {
  if (running) return;
  ensureAudio();

  if (!("mediaDevices" in navigator)) {
    setStatus("이 브라우저는 웹캠 API를 지원 안 함.", false);
    return;
  }

  running = true;
  lastGoodTime = Date.now();
  clearAlarm();
  setStatus("웹캠 시작 중...", true);

  faceDetection = new FaceDetection({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
  });

  faceDetection.setOptions({
    model: "short",
    minDetectionConfidence: 0.6
  });

  faceDetection.onResults(checkFace);

  camera = new Camera(video, {
    onFrame: async () => {
      if (running && faceDetection) await faceDetection.send({ image: video });
    },
    width: 640,
    height: 480
  });

  try {
    await camera.start();
    setStatus("감시 중. 딴짓하면 바로 울림.", true);
  } catch (err) {
    running = false;
    setStatus("웹캠 권한 실패: " + err.message, false);
  }
}

function stopApp() {
  running = false;
  clearAlarm();
  stopSiren();

  try {
    const stream = video.srcObject;
    if (stream) stream.getTracks().forEach(track => track.stop());
    video.srcObject = null;
  } catch (e) {}

  setStatus("정지됨.", true);
}

notifyBtn.onclick = async () => {
  if (!("Notification" in window)) {
    setStatus("이 브라우저는 알림 지원 안 함.", false);
    return;
  }
  const result = await Notification.requestPermission();
  setStatus(result === "granted" ? "알림 권한 허용됨." : "알림 권한 거부됨.", result === "granted");
};

startBtn.onclick = startApp;
stopBtn.onclick = stopApp;
testBtn.onclick = () => triggerAlarm("사이렌 테스트");
awakeBtn.onclick = clearAlarm;

document.addEventListener("visibilitychange", () => {
  if (document.hidden && running) {
    browserNotify("탭이 백그라운드로 감. 작은 창으로 켜둬라");
  }
});

window.addEventListener("beforeunload", stopApp);
</script>
</body>
</html>
